{% extends 'base.html' %}
{% block content %}
<div class="card p-4 glass" style="max-width:700px; margin:2rem auto;" data-reveal>
  <h3 class="text-white mb-3">Edit Complaint</h3>
  
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div class="mb-3">
      <label class="form-label text-light">Name</label>
      {{ form.name }}
    </div>
    
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label text-light">Phone</label>
        {{ form.phone }}
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label text-light">Location</label>
        {{ form.location }}
      </div>
    </div>
    
    <div class="mb-3">
      <label class="form-label text-light">Description</label>
      {{ form.description }}
    </div>
    
    <div class="mb-3">
      <label class="form-label text-light">Image</label>
      {{ form.image }}
      {% if comp.image %}<p class="text-light small mt-1">Current: <a href="{{ comp.image.url }}" target="_blank" class="text-primary">View</a></p>{% endif %}
    </div>
    
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{% url 'track_complaint' comp.id %}" class="btn btn-outline-light">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
